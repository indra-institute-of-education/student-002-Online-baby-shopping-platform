

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tiny Twinkles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(-45deg, #f8cdda, #a6c1ee, #fbc2eb, #8fd3f4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 45px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: float 6s ease-in-out infinite, fadeIn 1s ease-out;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            margin-bottom: 30px;
            color: #1e293b;
            font-weight: 700;
        }
        
        .form-control {
            border-radius: 15px;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 0.25rem rgba(255, 255, 255, 0.5);
        }

        .btn-classic {
            background: #1e293b;
            color: white;
            border-radius: 15px;
            padding: 12px 20px;
            transition: all 0.3s ease;
            width: 100%;
            font-weight: 600;
            border: none;
            margin-top: 10px;
        }
        .btn-classic:hover {
            background: #334155;
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>✨ Admin Login ✨</h2>
        <form id="admin-login-form">
            <div class="mb-3">
                <label for="admin-email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="admin-email" required>
            </div>
            <div class="mb-3">
                <label for="admin-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="admin-password" required>
            </div>
            <button type="submit" class="btn btn-classic">Login</button>
            <div id="error-message" class="text-danger text-center mt-3"></div>
        </form>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const errorMessage = document.getElementById('error-message');

            // In a real application, you would fetch user data.
            // Here, we'll use predefined admin credentials.
            if (email === 'sharumathirk22@gmail.com' && password === 'admin123') {
                // Use sessionStorage to keep the user logged in for the session.
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMessage.textContent = 'Invalid email or password.';
            }
        });
    </script>
</body>
</html>
